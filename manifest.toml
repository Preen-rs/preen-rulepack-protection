schema_version = 1
pack_id = "preen-rs.protection.base"
name = "Preen Protection Base"
version = "0.1.1"
description = "Official base capability pack for protection-focused Smart Care checks on macOS and Linux."
author = "Preen Team"
license = "MIT"
homepage = "https://github.com/Preen-rs/preen-rulepack-protection"
core_compat = ">=0.1.0,<2.0.0"
action_api = 1
os_targets = ["Macos", "Linux"]
capabilities = ["FsRead", "RunCommand"]

[signing]
sigstore = true
issuer = "https://token.actions.githubusercontent.com"
identity = "https://github.com/Preen-rs/preen-rulepack-protection/.github/workflows/release-manual.yml@refs/heads/main"

[[rules]]
id = "protection-status-preview"
name = "Protection Status Preview"
rule_file = "rules/protection-status-preview.toml"

[[rules]]
id = "protection-hardening-preview"
name = "Protection Hardening Preview"
rule_file = "rules/protection-hardening-preview.toml"
