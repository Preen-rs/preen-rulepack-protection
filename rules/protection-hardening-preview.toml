schema_version = 1
id = "protection-hardening-preview"
name = "Protection Hardening Preview"
category = { Other = "protection" }
risk = "Medium"
enabled = true

[match]
mode = "Command"
paths = []
strategy = "Shallow"
command = ["sh", "-lc", "echo preen-protection-hardening"]
parser = ""

[action]
action_type = "RunCommand"
paths = []
command = ["sh", "-lc", "echo preen-protection-hardening-action"]
mode = "Confirm"
timeout_sec = 60
allow_globs = false
max_items = 100
package_manager = ""
project_types = []
params = { smart_care_capability = "protection", smart_care_review_hint = "Review hardening checklist before run" }
