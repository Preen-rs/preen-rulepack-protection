schema_version = 1
id = "protection-status-preview"
name = "Protection Status Preview"
category = "Other"
risk = "Low"
enabled = true

[match]
mode = "Command"
paths = []
strategy = "Shallow"
command = ["sh", "-lc", "echo preen-protection-status"]
parser = ""

[action]
action_type = "SystemStatus"
paths = []
command = []
mode = "Confirm"
timeout_sec = 30
allow_globs = false
max_items = 1000
package_manager = ""
project_types = []
params = { smart_care_capability = "protection", smart_care_review_hint = "Review protection posture before hardening tasks" }
